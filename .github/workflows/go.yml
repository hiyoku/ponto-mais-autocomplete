name: Go Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o dist/pma-linux-${{ matrix.goarch }} main.go

      - name: Create zip
        run: |
          cd dist
          zip pma-linux-${{ matrix.goarch }}.zip pma-linux-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pma-linux-${{ matrix.goarch }}
          path: dist/pma-linux-${{ matrix.goarch }}.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows (${{ matrix.goarch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        shell: pwsh
        run: go test ./...

      - name: Build binary
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -o "dist/pma-windows-${{ matrix.goarch }}.exe" main.go

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path "dist/pma-windows-${{ matrix.goarch }}.exe" -DestinationPath "dist/pma-windows-${{ matrix.goarch }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pma-windows-${{ matrix.goarch }}
          path: dist/pma-windows-${{ matrix.goarch }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: pma-*
          merge-multiple: true

      - name: List release assets
        run: ls -R release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
